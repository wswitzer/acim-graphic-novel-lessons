story:
  title: The Courtyard After the Lights Went Out
  original_theme: Amara learns that peace is not waiting for the electricity, the plan, or the neighborhood mood to return; it is already shining within her and can bless the courtyard without her controlling it.
  synopsis: 'On a humid evening after the planting day, a sudden power outage drops Amara’s apartment courtyard into darkness. Neighbors call for her because she usually knows what to do, and she feels the familiar pressure to become the community’s emergency light. While searching for candles, she notices her mind racing into lists, worries, and responsibility. Instead of directing everyone, she sits for one quiet minute near the herb table, calls her thoughts back, and lets the peace already in her be enough. When she opens her eyes, the courtyard has not become magical or solved, but it has become gentle: phone lights, candles, mint tea, a crying child comforted, and neighbors helping one another. Amara offers one calm blessing and one practical candle, discovering that the light within was not contained by the outage.'
continuity:
  character_memory_used: Amara has just learned that her function is not carrying the whole community alone and that sharing care does not deplete her. She remains strong and warm, but can still over-function when many people look to her for steadiness and can confuse rest with abandoning others.
  before_state: Amara begins tired but grateful after two community days. When the courtyard goes dark, she feels old responsibility surge and assumes peace must wait until she restores order.
  inner_movement: She recognizes that trying to become everyone’s outer light is another way of forgetting the light already within. She sits, closes her eyes, calls her scattered thoughts home, and lets quiet perception start within before she acts.
  miracle_shift: The outage no longer feels like proof that she must manage the whole courtyard. Amara sees the same peace shining through small ordinary acts, and her calm extends without becoming control.
  unresolved_thread: Amara may still over-function when a real crisis becomes complex, and rest may not always feel safe to her. This story completes a gentle three-lesson arc without erasing her sacrifice pattern permanently.
  updated_memory_proposal: Amara completed a gentle three-lesson arc in Lesson 188 by practicing that the peace of God is already shining within and does not depend on outer conditions. During a courtyard power outage, she paused before managing everyone, called her wandering thoughts home, and let calm extend through small shared acts rather than control.
