lesson_digest:
  lesson_text_source_used: "data/lessons/lesson-184.json"
  lesson_core_movement: >-
    The lesson moves the mind from trusting the world's labels, names, bodies,
    events, and categories as separate realities into a quiet recognition that
    names can be used for communication without being accepted as truth. The
    practice is to let perception be unified by one shared Identity, then return
    to ordinary symbols lightly and helpfully without being deceived by them.
  lesson_practice_shape: >-
    The student notices the mind's habit of naming and separating, pauses in
    quiet intervals where worldly learning becomes temporary, accepts one shared
    Identity beneath every label, and then uses ordinary names and symbols only
    for convenience while remembering they do not define reality.
  key_ideas_for_story:
    - Worldly names and labels make things seem separate, solid, and self-contained.
    - Symbols are useful for communication, but they are not the reality they seem to name.
    - A quiet interval lets the mind step out of the prison of labels and into a more unified seeing.
    - After the quiet, the character returns to ordinary life and still uses names, tickets, and words, but more lightly.
    - Seeing beyond labels allows a brother to be met as more than a body, role, complaint, or history.
  useful_short_phrases:
    - "Use all the little names"
    - "One Name"
    - "unify our sight"
  title_overfit_warning: >-
    The story will not turn inheritance into a family object or make the plot a
    symbolic dramatization of the title. It will embody the lesson's actual
    movement through Kenji's ordinary use of repair tags, customer names, and
    silence, showing names used for convenience but no longer believed as the
    truth of anyone.
