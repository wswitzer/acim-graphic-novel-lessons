  character_selection_rationale: Amara has appeared for only one consecutive lesson, and Lesson 187 is a natural continuation of the new arc begun in Lesson 186. Her active pattern is confusing love with sacrifice; this lesson directly reframes giving as proof of having and blessing as something that increases when extended. Continuing her for a second lesson fits the allowed 2–3 lesson short arc without overusing the character.
