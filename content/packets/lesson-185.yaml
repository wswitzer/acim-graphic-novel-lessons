image_prompts:
  overall: >-
    Create a polished portrait-oriented graphic novel sequence in STYLE-005 Minimalist Ink and Wash: clean black linework, sparse gray wash, expressive negative space, restrained emotional acting, and elegant panel composition. The selected character is Kenji Watanabe: late-50s Japanese quiet urban craftsman, apron, careful hands, wooden box/music box repair setting, rain umbrella, precise gentle presence. Preserve Kenji's visual continuity across all pages. Avoid halos, superheroes, literal religious cliches, and heavy magical effects. Use short readable caption boxes, speech bubbles, and thought bubbles exactly from the packet's text_items with clear ownership and placement.
  page_1: >-
    Page 1, "The Bargain Under Quiet," portrait graphic novel page with exactly 3 panels in Minimalist Ink and Wash. Panel 1 must include a tasteful lesson title / character title card reading exactly "Lesson 185 — I want the peace of God.\nKenji Watanabe" as a small pale rice-paper plaque in the upper left, integrated into the shop wall light and not covering Kenji's face, hands, or the music box. Show Kenji in his repair shop with a damaged music box and estimate form, then his private wish for a simple quiet estimate, then Mrs. Sato revealing the box belonged to her husband. Keep text readable and bubble ownership unambiguous.
  page_2: >-
    Page 2, "What Is Being Asked For," portrait graphic novel page with exactly 3 panels. Show Kenji noticing the bargain beneath his wish for peace: fixed price, short visit, no tears, no obligation. Use restrained ink-and-wash thought-symbols over the estimate form. Keep Kenji visually dominant for his thought bubbles, Mrs. Sato secondary where present, and end on a close view of the music box mechanism with the narrator caption about noticing the bargain underneath the words.
  page_3: >-
    Page 3, "One Intent," portrait graphic novel page with exactly 3 panels. Show Kenji softening and speaking gently to Mrs. Sato, then both listening together to one tiny broken note from the music box, then Kenji inwardly choosing the peace of God rather than his private version of quiet. Use elegant negative space and subtle ink curves to show sound and joining without religious imagery.
  page_4: >-
    Page 4, "The Gift Unshared Is Not the Gift," portrait graphic novel page with exactly 3 panels. Show the shop becoming quietly warmer through shared intent: Kenji writes a less defensive estimate, Mrs. Sato thanks him for not hurrying, and the final wide panel shows Kenji alone but not isolated, with the open rainy doorway and balanced negative space. Render the caption "No gift of God can be unshared." and Kenji's thought clearly and separately.
