spanish_practice:
  level: A1/A2
  phrases:
    - english: "I can be still."
      spanish: "Puedo estar quieto."
    - english: "I go home now."
      spanish: "Voy a casa ahora."
    - english: "I belong here."
      spanish: "Pertenezco aquí."
    - english: "Peace is inside."
      spanish: "La paz está adentro."
  micro_practice: "Pause with one hand open and say slowly: Puedo estar quieto. Then breathe once before checking your phone."
