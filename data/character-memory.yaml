characters:
  CHAR-011:
    name: Lucia Bell
    current_arc_summary: Lucia has had real holy instants through music and is beginning to trust that joy can remain quietly present after meaningful experiences end. She is practicing extending that joy directly in relationship and now has a simple homecoming practice for receiving peace inwardly before trying to secure it outwardly.
    current_emotional_state: Bright, musical, tender, increasingly willing to pause before control and receive stillness.
    already_healed_areas:
      - Can let music become prayer.
      - Has experienced joy as more than excitement.
      - Has multiple lived examples of joy continuing gently after the song ended.
      - Can share a song directly with a brother without making the moment smaller through humor.
      - Can pause for one instant and feel home as inward stillness before checking for signs of safety.
    still_active_patterns:
      - Pulls back from happiness to avoid future grief.
      - Deflects tenderness with jokes.
      - Looks for old evidence before trusting someone who disappointed her before.
      - Wants to check messages or future outcomes to make sure peace will not disappear.
    do_not_resolve_yet:
      - Do not make joy permanently effortless.
      - Do not make her stop protecting against loss all at once.
      - Do not make interpersonal trust instantly complete or sentimental.
      - Do not make stillness a permanent state she never leaves.
    next_natural_step: Let her practice the small homecoming pause in another ordinary situation, especially when a message, expectation, or relationship question pulls at her attention.
    recent_lessons:
      - 180
      - 181
  CHAR-006:
    name: Mateo Alvarez
    current_arc_summary: Mateo completed a short three-lesson identity arc. In Lesson 182, he practiced pausing between two streets rather than checking messages or choosing a side to prove where he belongs. In Lesson 183, he practiced noticing the many little names that try to divide him and letting one inward Name gather them into a quiet shared identity. In Lesson 184, he let an old family bracelet become a symbol of inherited love rather than a demand to choose one side of himself.
    current_emotional_state: Sensitive, quietly more rooted, still young and socially uncertain, but now carrying home, Name-practice, and inheritance as simple inner references.
    already_healed_areas:
      - Has found moments of inner home through music, movement, and sunlight.
      - Can pause before turning social uncertainty into proof that he has no place.
      - Has one lived example of home arriving as inward steadiness before an outer door opens.
      - Has one lived example of little labels losing power when he rests in a deeper shared identity.
      - Has one lived example of family symbols pointing to inherited love without becoming chains.
    still_active_patterns:
      - Compares himself to others who seem to belong more easily.
      - Interprets exclusion or silence as evidence that he has no place.
      - Feels split between family, language, neighborhood, and peer worlds.
      - Reaches for his phone to settle belonging through replies or signs.
      - Answers to nicknames, roles, and labels as if they define how much of himself is allowed.
      - Can still feel exposed when family teasing names his divided identity.
    do_not_resolve_yet:
      - Do not make belonging permanently effortless.
      - Do not make social comparison vanish all at once.
      - Do not make him fully confident in every family or peer situation.
      - Do not turn the between-places pause into a magical solution for every uncertainty.
      - Do not make his Name-practice erase all sensitivity to labels or exclusion.
      - Do not make inherited love feel permanently embodied in every social situation.
    next_natural_step: Rotate away from Mateo next unless there is a strong deliberate reason to continue; when he returns, let him practice home, Name-practice, or inheritance in a new peer or family situation without fully resolving belonging.
    recent_lessons:
      - 182
      - 183
      - 184
  CHAR-010:
    name: Kenji Watanabe
    current_arc_summary: Kenji began a new arc by noticing that repair tickets, customer names, and object labels can be useful without being true identity. In Lesson 185, he practiced noticing that his wish for peace was mixed with a bargain for distance. In a repair-shop moment with Mrs. Sato, he questioned whether protected quiet was what he wanted in place of God's peace and let one small honest sentence turn silence into shared intent.
    current_emotional_state: Quiet, precise, and more willing to let stillness include another person's feeling rather than protect him from it.
    already_healed_areas:
      - Has touched wordless peace through careful craft and stillness.
      - Can notice when silence is being used as withdrawal rather than joining.
      - Has one lived example of using names and tickets for convenience without accepting them as reality.
      - Has one lived example of questioning a private bargain for distance and choosing shared peace instead.
    still_active_patterns:
      - Mistakes speechlessness for distance.
      - Retreats into task-control when another person's emotion feels too direct.
      - Uses labels, systems, and precision to keep human need at a manageable distance.
      - Hesitates to speak when a simple human word would join.
      - Can still confuse a quiet environment with the peace of God.
    do_not_resolve_yet:
      - Do not make him suddenly talkative or emotionally transparent.
      - Do not make silence permanently safe in every relationship.
      - Do not make his precision vanish; let craft remain a gentle strength.
      - Do not make him fully comfortable with another person's grief or urgency.
      - Do not make him always choose shared peace without first noticing a subtle bargain.
    next_natural_step: Let Kenji practice a small word, gesture, or repair when silence could become either a wall or a bridge; rotate away after one more lesson unless a strong lesson-specific reason supports continuing.
    recent_lessons:
      - 184
      - 185
