characters:
  CHAR-011:
    name: Lucia Bell
    current_arc_summary: Lucia has had real holy instants through music and is beginning to trust that joy can remain quietly present after meaningful experiences end.
    current_emotional_state: Bright, musical, tender, increasingly willing to stay open.
    already_healed_areas:
      - Can let music become prayer.
      - Has experienced joy as more than excitement.
      - Has multiple lived examples of joy continuing gently after the song ended.
    still_active_patterns:
      - Pulls back from happiness to avoid future grief.
      - Deflects tenderness with jokes.
    do_not_resolve_yet:
      - Do not make joy permanently effortless.
      - Do not make her stop protecting against loss all at once.
    next_natural_step: Let her share joy directly with another person without softening it through humor.
    recent_lessons:
      - 179
      - 180